<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="heading">Anime Tracker</h1>
      <p class="para">Track your animes!</p>
      <div class="div1">
        <div class="field">
          <label class="label1">Enter anime name</label>
          <input type="text" class="inputtext" />
        </div>

        <div class="field">
          <label class="label2">Enter date finished</label>
          <input type="date" class="inputdate" />
        </div>

        <button class="button1">Submit</button>
      </div>
      <div class="div2">
        <h2 class="heading2">Watched animes</h2>
        <ul class="unli"></ul>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
