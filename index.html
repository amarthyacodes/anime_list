<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Anime!</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <div class="border">
    <h1 id="heading">Anime Tracker</h1>
    <p id="subtext">Track your animes!</p>
    <div class="inputs">
      <label for="anime_name">Anime Name</label>
      <input type="text" id="anime_name" class="anime_name">
      <label for="anime_date">Date</label>
      <input type="date" id="anime_date">
      <button id="submit"type="submit">Submit</button>
      <div class="info">
        <h2 id="anime_info">Watched Animes</h2>
        <ul class="anime_list">
        
      </ul></div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
